provenance_note: Sanctions and Anti-Money Laundering Act 2018 (c. 13) — the post-Brexit framework empowering
  the making of sanctions regulations and of money-laundering/terrorist-financing regulations. The enabling
  framework is in scope; specific sanctions designations and lists made under it are out of scope (operational
