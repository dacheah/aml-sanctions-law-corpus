provenance_note: Economic Crime and Corporate Transparency Act 2023 (c. 56), enacted 26 October 2023.
  Reforms Companies House, limited partnerships and register of overseas entities, and amends the Proceeds
  of Crime Act 2002 (including cryptoasset civil recovery and information-sharing). Captured 'as enacted'
  for lineage. Byte-exact original captured as the official PDF; text.txt extracted with per-page furniture
  removed. Crown copyright, OGL v3.0. Fidelity extracted_unverified.
