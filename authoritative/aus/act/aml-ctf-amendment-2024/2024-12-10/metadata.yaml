provenance_note: As-made amending Act No. 110 of 2024 (registration C2024A00110), assented 10 December
  2024. Amends the Anti-Money Laundering and Counter-Terrorism Financing Act 2006 (Cth) and repeals the
  Financial Transaction Reports Act 1988 (Cth). Phased commencement across 7 Jan 2025, 31 Mar 2025, 31
  Mar 2026 and 1 Jul 2026 (per the Act's commencement table). Byte-exact original captured as the official
  Word (DOCX) as-made download from the Federal Register; text.txt extracted from that DOCX (paragraphs
  and tables, document order). The Register PDF of the same as-made Act is anchored by hash sha256:0b1eb56b2134a0748d32204f67c7b4e9fc46a17253b41140596d048378c9804b.
