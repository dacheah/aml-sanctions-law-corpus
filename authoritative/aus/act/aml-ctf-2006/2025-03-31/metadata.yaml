provenance_note: Official point-in-time compilation (Compilation No. 59, registration C2025C00235, compilation
  date 31 March 2025, in force 31 March 2025 – 30 March 2026) of the AML/CTF Act 2006 (Cth) — the PRE-REFORM
  BASELINE ('old regime'), the law as it stood immediately before the main Tranche 2 reforms commenced
  on 31 March 2026. It predates the virtual-asset definitions, the VASP Register, and the CDD/enrolment
  reforms (confirmed absent on capture). Captured to show the law as it was vs as it is. Byte-exact original
  captured as the official Word (DOCX) download from the Federal Register; text.txt extracted from that
  DOCX. The Register PDF of the same compilation is anchored by hash sha256:254ca2d92d19618094122188265a9d31f91b5ef8e052c8f187e0c6995db8fbda.
  Human download from the official source; fidelity extracted_unverified pending verification. An earlier
  compilation (No. 58, C2025C00044) precedes this and is not yet captured.
