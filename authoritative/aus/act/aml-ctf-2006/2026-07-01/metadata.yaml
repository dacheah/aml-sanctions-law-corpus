provenance_note: 'Official point-in-time compilation (Compilation No. 62, C2026C00274, in force from 1
  July 2026) of the AML/CTF Act 2006 (Cth), incorporating amendments up to Act No. 110, 2024. Byte-exact
  original captured as the official Word (DOCX) download from the Federal Register of Legislation; text.txt
  extracted from that DOCX (paragraphs and tables, in document order) by the same scripts/extract.py used
  for the preceding compilations. The Register''s PDF of the SAME compilation was also retrieved and is
  anchored by hash sha256:85235a4f427ecbacb886aaa44d5c0826844ab1c8e7cf627fb8ca0ccdf0a81c15. DISCOVERY:
  this compilation was found by the source monitor after the AML/CTF Act source was moved from page-hashing
  to the Federal Register OData API (api.prod.legislation.gov.au/v1/Versions), which reports the compilation
  number and its start date directly; the API records that this version exists because of sch 4 (items
  1-30) and sch 7 (item 1) of the Anti-Money Laundering and Counter-Terrorism Financing Amendment Act
  2024 (No. 110, 2024) — the amending Act already held in this corpus as aus/act/aml-ctf-amendment-2024,
  and the tranche of reforms commencing 1 July 2026. The compilation''s own cover confirms ''Compilation
  No. 62'', ''Compilation date: 1 July 2026'' and ''Includes amendments: Act No. 110, 2024''. Fidelity
  extracted_unverified at ingest, pending the cross-engine gate (scripts/verify_fidelity.py); a pre-check
  against LibreOffice --convert-to txt scored unigram_forward 0.9992, bigram_forward 0.9992, unigram_reverse
  0.9998 — identical to Compilation No. 61 and above the 0.995/0.90 thresholds.'
