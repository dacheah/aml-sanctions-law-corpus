name: Source monitor

# Weekly watch of the official source pages (monitoring/sources.json). Fetches each,
# reduces it to comparable text, hashes it, and compares to the stored baseline.
# It ONLY watches and queues: on a detected change it opens an issue for the
# maintainer to triage. Nothing is ingested automatically. The advanced baseline and
# the latest report are committed back so the next run diffs against them.

on:
  schedule:
    - cron: "17 20 * * 1"   # every Monday 20:17 UTC
  workflow_dispatch:

permissions:
  contents: write   # commit the advanced baseline + report
  issues: write     # open a triage issue on change

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check monitored sources
        id: watch
        run: python scripts/watch_sources.py

      - name: Commit advanced baseline and report
        # monitoring/snapshots/ MUST be staged. Record mode (json_extract) decides
        # baseline-vs-changed on `not os.path.isfile(snapshot)`, so an uncommitted snapshot means
        # every run starts with no prior records and reports "baseline" forever. This repo has
        # EIGHT json_extract sources — the Federal Register OData feeds for the AML/CTF Act, the
        # Autonomous Sanctions instruments and FinCEN 31 CFR 1010 — and none of them could have
        # reported a change from CI. Compilation No. 62 was found by a LOCAL run, where the
        # snapshot survives on disk.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add monitoring/sources.json monitoring/last_report.md
          git add monitoring/snapshots monitoring/false_alarm_log.jsonl || true
          if git diff --cached --quiet; then
            echo "No baseline or report changes to commit."
          else
            git commit -m "chore(monitor): update source baseline and report"
            git push
          fi

      - name: Open triage issue on change or breakage
        # `changes` now also goes true when a source could not be checked at all. Until monitor
        # v3.5 the flag omitted both error terms, so a run in which every source errored exited 0
        # and opened nothing.
        if: steps.watch.outputs.changes == 'true'
        uses: actions/github-script@v7
        env:
          BROKEN: ${{ steps.watch.outputs.broken }}
        with:
          script: |
            const fs = require('fs');
            let report = 'See `monitoring/last_report.md` in the repo.';
            try { report = fs.readFileSync('monitoring/last_report.md', 'utf8'); } catch (e) {}
            const broken = process.env.BROKEN === 'true';
            const today = new Date().toISOString().slice(0, 10);
            const foot = broken
              ? '\n\n_An error means the monitor DID NOT LOOK. It does not mean nothing changed — do not read the rest of this report as reassurance until the monitor is fixed._'
              : '\n\n_Automated flag. A change may be a genuinely new/amended instrument OR a cosmetic page update — triage before ingesting._';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: broken
                ? `Source monitor: MONITOR BROKEN — source(s) not checked (${today})`
                : `Source monitor: a monitored source changed (${today})`,
              body: report + foot,
              labels: broken ? ['source-monitor', 'monitor-broken'] : ['source-monitor']
            });
